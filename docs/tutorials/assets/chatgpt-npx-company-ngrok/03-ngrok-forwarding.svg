    <text x="84" y="288" fill="#9ca3af">Region                        United States (us)</text>
    <text x="84" y="330" fill="#9ca3af">Web Interface                 http://127.0.0.1:4040</text>
    <text x="84" y="396" fill="#86efac">Forwarding                    https://redacted-ngrok.ngrok-free.app -&gt; http://localhost:3000</text>
    <text x="84" y="480" fill="#facc15">Use https://redacted-ngrok.ngrok-free.app/mcp in ChatGPT.</text>
