  <text x="532" y="218" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">ask</text>
  <rect x="582" y="198" width="150" height="28" rx="14" fill="#ede9fe"/>
  <text x="657" y="218" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">suggest_question</text>
  <rect x="102" y="294" width="1076" height="286" rx="14" fill="#ffffff" stroke="#e2e2dc"/>
