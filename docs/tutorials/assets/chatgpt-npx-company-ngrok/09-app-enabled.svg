  <rect x="102" y="144" width="1076" height="96" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="134" y="178" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="700">Developer Mode app enabled</text>
  <rect x="134" y="198" width="226" height="28" rx="14" fill="#dcfce7"/>
  <text x="247" y="218" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="14" font-weight="700">AIProfile Company Memory</text>
  <rect x="388" y="198" width="94" height="28" rx="14" fill="#ede9fe"/>
  <text x="435" y="218" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">ingest</text>
