<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT composer showing Developer Mode app enabled</title>
  <desc id="desc">A redacted ChatGPT conversation screenshot showing a Developer Mode app enabled and AIProfile tools available.</desc>
  <rect width="1280" height="760" fill="#f7f7f2"/>
  <rect x="58" y="48" width="1164" height="664" rx="18" fill="#ffffff" stroke="#d8d8d0"/>
