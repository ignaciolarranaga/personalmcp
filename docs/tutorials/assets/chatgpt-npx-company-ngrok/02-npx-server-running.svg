    <text x="84" y="364" fill="#9ca3af">Auth mode: local</text>
    <text x="84" y="406" fill="#9ca3af">Anonymous access: enabled for public-safe ask</text>
    <text x="84" y="494" fill="#facc15">Keep this terminal running while ChatGPT uses the app.</text>
