  <rect x="388" y="216" width="744" height="238" rx="14" fill="#ffffff" stroke="#deded8"/>
  <text x="422" y="262" fill="#202123" font-family="Arial, sans-serif" font-size="22" font-weight="700">Advanced settings</text>
  <text x="422" y="302" fill="#565869" font-family="Arial, sans-serif" font-size="17">Create and test local or draft apps backed by remote MCP servers.</text>
  <text x="422" y="374" fill="#202123" font-family="Arial, sans-serif" font-size="19" font-weight="700">Developer mode</text>
  <rect x="1010" y="346" width="74" height="38" rx="19" fill="#10a37f"/>
  <circle cx="1064" cy="365" r="15" fill="#ffffff"/>
  <rect x="422" y="402" width="176" height="44" rx="10" fill="#202123"/>
  <text x="510" y="431" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Create app</text>
