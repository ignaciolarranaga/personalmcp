<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT Settings Apps with Developer Mode enabled</title>
  <desc id="desc">A redacted ChatGPT settings screenshot showing Apps advanced settings and Developer Mode enabled.</desc>
  <rect width="1280" height="760" fill="#f5f5f0"/>
  <rect x="72" y="54" width="1136" height="652" rx="18" fill="#ffffff" stroke="#d8d8d0"/>
  <rect x="72" y="54" width="260" height="652" rx="18" fill="#f0f0ea"/>
  <text x="112" y="112" fill="#202123" font-family="Arial, sans-serif" font-size="28" font-weight="700">ChatGPT</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#565869">
    <text x="112" y="182">General</text>
    <rect x="100" y="210" width="198" height="42" rx="8" fill="#e5e5dc"/>
    <text x="112" y="238" fill="#202123" font-weight="700">Apps</text>
    <text x="112" y="302">Data controls</text>
  </g>
  <text x="388" y="118" fill="#202123" font-family="Arial, sans-serif" font-size="34" font-weight="700">Apps</text>
