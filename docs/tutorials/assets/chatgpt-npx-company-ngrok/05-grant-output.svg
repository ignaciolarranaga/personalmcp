<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">npx grant output with redacted approval code</title>
  <desc id="desc">A redacted terminal screenshot showing an AIProfile OAuth grant created through npx.</desc>
  <rect width="1280" height="760" fill="#f6f7f9"/>
  <rect x="48" y="42" width="1184" height="676" rx="12" fill="#111827"/>
  <rect x="48" y="42" width="1184" height="42" rx="12" fill="#202938"/>
  <circle cx="76" cy="63" r="7" fill="#ff5f57"/><circle cx="99" cy="63" r="7" fill="#ffbd2e"/><circle cx="122" cy="63" r="7" fill="#28c840"/>
  <text x="640" y="69" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-size="15">Terminal - ChatGPT OAuth grant</text>
  <g font-family="Menlo, Consolas, monospace" font-size="20" fill="#e5e7eb">
    <text x="84" y="124">$ npx --yes --ignore-scripts=false aiprofile auth grant add \</text>
    <text x="84" y="166">  --subject chatgpt-company-owner \</text>
    <text x="84" y="208">  --preset owner-full \</text>
    <text x="84" y="250">  --resource https://redacted-ngrok.ngrok-free.app/mcp</text>
    <text x="84" y="322" fill="#9ca3af">Grant: grant_a91d...redacted</text>
    <text x="84" y="364" fill="#9ca3af">Subject: chatgpt-company-owner</text>
    <text x="84" y="406" fill="#facc15">Code: AIP-4R7-****-K2M</text>
    <text x="84" y="448" fill="#9ca3af">Resource: https://redacted-ngrok.ngrok-free.app/mcp</text>
    <text x="84" y="490" fill="#9ca3af">Scopes: aiprofile:ask aiprofile:ingest aiprofile:suggest memory:read:kind:*</text>
    <text x="84" y="574" fill="#86efac">Use this one-time code on the AIProfile OAuth authorization page.</text>
  </g>
</svg>
