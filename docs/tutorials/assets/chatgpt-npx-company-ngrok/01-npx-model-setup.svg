<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">npx model setup in a clean working directory</title>
  <desc id="desc">A redacted terminal screenshot showing a clean company profile directory and npx model setup.</desc>
  <rect width="1280" height="760" fill="#f6f7f9"/>
  <rect x="48" y="42" width="1184" height="676" rx="12" fill="#111827"/>
  <rect x="48" y="42" width="1184" height="42" rx="12" fill="#202938"/>
  <circle cx="76" cy="63" r="7" fill="#ff5f57"/><circle cx="99" cy="63" r="7" fill="#ffbd2e"/><circle cx="122" cy="63" r="7" fill="#28c840"/>
  <text x="640" y="69" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-size="15">Terminal - ChatGPT company setup</text>
  <g font-family="Menlo, Consolas, monospace" font-size="20" fill="#e5e7eb">
    <text x="84" y="126">$ mkdir aiprofile-chatgpt-company</text>
    <text x="84" y="166">$ cd aiprofile-chatgpt-company</text>
    <text x="84" y="218">$ npx --yes --ignore-scripts=false aiprofile setup-model --model qwen3-4b --write-config</text>
    <text x="84" y="274" fill="#93c5fd">Selected model: qwen3-4b-instruct-q4_k_m</text>
    <text x="84" y="316" fill="#93c5fd">Saved to: ./models/qwen3-4b-instruct-q4_k_m.gguf</text>
    <text x="84" y="358" fill="#86efac">Wrote config.yaml in ./aiprofile-chatgpt-company</text>
    <text x="84" y="418" fill="#9ca3af">Created local paths:</text>
    <text x="118" y="460" fill="#9ca3af">./config.yaml</text>
    <text x="118" y="500" fill="#9ca3af">./models/</text>
    <text x="118" y="540" fill="#9ca3af">./memory/ will be created on first serve</text>
    <text x="84" y="620" fill="#facc15">Next: npx --yes --ignore-scripts=false aiprofile serve</text>
  </g>
</svg>
