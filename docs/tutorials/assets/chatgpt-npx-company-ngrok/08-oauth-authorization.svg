<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AIProfile OAuth authorization page</title>
  <desc id="desc">A redacted browser screenshot showing the AIProfile OAuth approval page and one-time code field.</desc>
  <rect width="1280" height="760" fill="#eef2f7"/>
  <rect x="146" y="70" width="988" height="620" rx="18" fill="#ffffff" stroke="#d7dde8"/>
  <text x="640" y="144" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Authorize AIProfile access</text>
  <text x="640" y="186" text-anchor="middle" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">ChatGPT is requesting access to your local AIProfile server.</text>
  <rect x="246" y="230" width="788" height="92" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="280" y="266" fill="#374151" font-family="Arial, sans-serif" font-size="17" font-weight="700">Resource</text>
  <text x="280" y="300" fill="#111827" font-family="Menlo, Consolas, monospace" font-size="17">https://redacted-ngrok.ngrok-free.app/mcp</text>
  <text x="246" y="376" fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700">One-time approval code</text>
  <rect x="246" y="396" width="480" height="56" rx="8" fill="#ffffff" stroke="#9ca3af"/>
  <text x="272" y="432" fill="#111827" font-family="Menlo, Consolas, monospace" font-size="20">AIP-4R7-****-K2M</text>
  <text x="246" y="506" fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700">Requested scopes</text>
  <text x="246" y="542" fill="#4b5563" font-family="Arial, sans-serif" font-size="17">ask, ingest, suggest_question, owner memory read access</text>
  <rect x="780" y="584" width="254" height="54" rx="10" fill="#2563eb"/>
  <text x="907" y="619" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Approve access</text>
</svg>
