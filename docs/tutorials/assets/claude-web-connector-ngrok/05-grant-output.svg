<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Grant command output with code partially redacted</title>
  <desc id="desc">A redacted terminal screenshot showing an AIProfile OAuth grant and one-time approval code.</desc>
  <rect width="1280" height="760" fill="#f6f7f9"/>
  <rect x="48" y="42" width="1184" height="676" rx="12" fill="#111827"/>
  <rect x="48" y="42" width="1184" height="42" rx="12" fill="#202938"/>
  <circle cx="76" cy="63" r="7" fill="#ff5f57"/><circle cx="99" cy="63" r="7" fill="#ffbd2e"/><circle cx="122" cy="63" r="7" fill="#28c840"/>
  <text x="640" y="69" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-size="15">Terminal - OAuth grant</text>
  <g font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">
    <text x="84" y="128">$ npm run auth -- grant add \</text>
    <text x="84" y="170">  --subject claude-web-owner \</text>
    <text x="84" y="212">  --preset owner-full \</text>
    <text x="84" y="254">  --resource https://redacted-ngrok.ngrok-free.app/mcp</text>
    <text x="84" y="326" fill="#9ca3af">Grant: grant_7f3c...redacted</text>
    <text x="84" y="368" fill="#9ca3af">Subject: claude-web-owner</text>
    <text x="84" y="410" fill="#facc15">Code: AIP-8K2-****-Q9Z</text>
    <text x="84" y="452" fill="#9ca3af">Resource: https://redacted-ngrok.ngrok-free.app/mcp</text>
    <text x="84" y="494" fill="#9ca3af">Scopes: aiprofile:ask aiprofile:ingest aiprofile:suggest memory:read:kind:*</text>
    <text x="84" y="578" fill="#86efac">Use this one-time code on the AIProfile OAuth authorization page.</text>
  </g>
</svg>
