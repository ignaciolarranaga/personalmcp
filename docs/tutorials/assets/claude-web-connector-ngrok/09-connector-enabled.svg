<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Claude conversation with connector enabled</title>
  <desc id="desc">A redacted Claude conversation screenshot showing the AIProfile connector enabled and available tools.</desc>
  <rect width="1280" height="760" fill="#f7f3ed"/>
  <rect x="58" y="48" width="1164" height="664" rx="18" fill="#ffffff" stroke="#ded6c8"/>
  <text x="102" y="108" fill="#2f271f" font-family="Arial, sans-serif" font-size="28" font-weight="700">Claude</text>
  <rect x="102" y="144" width="1076" height="88" rx="14" fill="#f8f1e8" stroke="#e2d4c2"/>
  <text x="134" y="178" fill="#2f271f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Connectors enabled</text>
  <rect x="134" y="196" width="142" height="26" rx="13" fill="#dff3e5"/>
  <text x="205" y="215" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="14" font-weight="700">AIProfile</text>
  <rect x="306" y="196" width="94" height="26" rx="13" fill="#ede9fe"/>
  <text x="353" y="215" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">ingest</text>
  <rect x="414" y="196" width="72" height="26" rx="13" fill="#ede9fe"/>
  <text x="450" y="215" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">ask</text>
  <rect x="500" y="196" width="150" height="26" rx="13" fill="#ede9fe"/>
  <text x="575" y="215" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14">suggest_question</text>
  <rect x="102" y="284" width="1076" height="300" rx="14" fill="#ffffff" stroke="#e8dfd3"/>
  <text x="134" y="332" fill="#6b5f55" font-family="Arial, sans-serif" font-size="18">New chat</text>
  <text x="134" y="382" fill="#2f271f" font-family="Arial, sans-serif" font-size="22">AIProfile is connected. You can now ask Claude to ingest or query profile memory.</text>
  <rect x="102" y="622" width="1076" height="52" rx="14" fill="#fbfaf8" stroke="#d8cdbc"/>
  <text x="132" y="655" fill="#8a7c6d" font-family="Arial, sans-serif" font-size="17">Message Claude...</text>
</svg>
