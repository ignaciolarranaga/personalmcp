<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Terminal after model setup succeeds</title>
  <desc id="desc">A redacted terminal screenshot showing dependency installation, model setup, config update, and successful build.</desc>
  <rect width="1280" height="760" fill="#f6f7f9"/>
  <rect x="48" y="42" width="1184" height="676" rx="12" fill="#111827"/>
  <rect x="48" y="42" width="1184" height="42" rx="12" fill="#202938"/>
  <circle cx="76" cy="63" r="7" fill="#ff5f57"/><circle cx="99" cy="63" r="7" fill="#ffbd2e"/><circle cx="122" cy="63" r="7" fill="#28c840"/>
  <text x="640" y="69" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-size="15">Terminal - AIProfile setup</text>
  <g font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">
    <text x="84" y="132">$ npm install --ignore-scripts=false</text>
    <text x="84" y="174" fill="#9ca3af">added packages, audited dependencies</text>
    <text x="84" y="228">$ npm run setup-model -- --model qwen3-4b --write-config</text>
    <text x="84" y="270" fill="#93c5fd">Selected model: qwen3-4b-instruct-q4_k_m</text>
    <text x="84" y="312" fill="#93c5fd">Saved to: ./models/qwen3-4b-instruct-q4_k_m.gguf</text>
    <text x="84" y="354" fill="#86efac">Updated config.yaml: llm.model and llm.model_path</text>
    <text x="84" y="408">$ npm run build</text>
    <text x="84" y="450" fill="#9ca3af">&gt; aiprofile@0.2.0 build</text>
    <text x="84" y="492" fill="#9ca3af">&gt; tsc -p tsconfig.json</text>
    <text x="84" y="552" fill="#86efac">Build completed successfully.</text>
    <text x="84" y="626" fill="#facc15">Next: npm start</text>
  </g>
</svg>
